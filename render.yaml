services:
  - type: web
    name: cv-analysis-backend
    runtime: node
    repo: https://github.com/sajidhussainbaloch/cv-genrator
    branch: main
    buildCommand: cd backend && npm install && npm run build
    startCommand: cd backend && node build/index.cjs
    healthCheckPath: /api/ping
    plan: free
    envVars:
      - key: AI_BASE_URL
        value: https://api.openai.com/v1
      - key: AI_MODEL
        value: gpt-4o-mini
